<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    if (localStorage.getItem("color-theme") === "dark" || (!localStorage.getItem("color-theme") && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script type="module" crossorigin src="/assets/supabaseClient-BpBB6T06.js"></script>
  <script type="module" crossorigin src="/assets/loader-Cx46XOA1.js"></script>
  <script type="module" crossorigin src="/assets/marketplace-qQcPNHjp.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/marketplace-Dfu4hYPo.css">
</head>

<body class="overflow-x-hidden">
  <div class="flex h-screen bg-[#030406]">
    <div id="navigation-container"></div>
    <title>Univo|Market place</title>

    <div class="flex-1 flex flex-col w-full min-w-0 flex-shrink">
      <main id="main"
        class="flex-1 ml-0 md:ml-64 p-8 min-h-screen transition-all duration-300 mt-25  bg-white flex flex-col dark:bg-[#101014] relative overflow-y-auto">


        <div class="fixed inset-0 z-50 flex items-center justify-center backdrop-blur-3xl hidden p-4 md:p-8"
          id="popupwindow">
          <!-- Product Popup -->
          <div id="productdetails"
            class="relative flex flex-col md:flex-row w-250 max-w-6xl h-full max-h-[90vh] md:h-[80vh] bg-[#e3e3e3] dark:bg-[#1f1f26] rounded-3xl shadow-[0_0_20px_rgba(255,255,255,0.2)] overflow-y-auto md:overflow-hidden translate-x-30">

            <div class="w-full md:w-1/2 p-12 flex items-center justify-center bg-black/50 relative ">
              <button id="previousimgbtn">
                <div class="bg-black rounded-2xl p-1 cursor-pointer">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                  </svg>
                </div>
              </button>
              <img id="productpageuploadimage" src=""
                class="transition-transform duration-500 max-w-full max-h-[40vh] md:max-h-full object-contain rounded-2xl m-1" />
              <button id="nextimgbtn">
                <div class="bg-black rounded-2xl p-1 cursor-pointer">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                  </svg>
                </div>
              </button>
              <div id="image-indicators" class="absolute bottom-4 flex gap-2"></div>
            </div>

            <div class="w-full md:w-1/2 p-6 md:p-10 flex flex-col">
              <h2 id="productname" class="text-3xl md:text-4xl text-[#30303b] dark:text-white font-sans font-semibold">
                Product name
              </h2>

              <p id="productprice" class="text-3xl md:text-4xl text-yellow-500 mt-4 font-sans font-bold">
                ₹120
              </p>

              <hr class="border-gray-800 my-6 shrink-0">

              <div class="flex-1 overflow-y-auto pr-2 no-scrollbar flex flex-col gap-6 min-h-0">
                <div>
                  <h3 class="text-xl md:text-2xl font-sans text-[#30303b] font-bold dark:text-white mb-3">Description
                  </h3>
                  <div class="w-full p-4 rounded-2xl bg-[#d6d6d6] dark:bg-[#2b3442] break-words">
                    <p id="productdescription" class="font-sans leading-relaxed text-[#30303b] dark:text-white text-sm">
                      no description provided
                    </p>
                  </div>
                </div>

                <div>
                  <h3 class="text-xl md:text-2xl font-sans text-[#30303b] font-bold dark:text-white mb-3">More Details
                  </h3>
                  <div class="w-full p-4 rounded-2xl bg-[#d6d6d6] dark:bg-[#2b3442] break-words">
                    <p class="text-sm md:text-base text-gray-900 dark:text-white font-sans whitespace-pre-wrap"
                      id="otherdetails"></p>
                  </div>
                </div>
              </div>

              <div class="mt-4 pt-4 shrink-0 flex flex-col gap-3">
                <button id="contactsellerbutton"
                  class="w-full py-4 rounded-2xl bg-[#F0B100] font-bold text-xl hover:bg-[#d9a100] transition-colors cursor-pointer">
                  Contact Seller
                </button>
                <button id="productpageaddtowishlistbtn"
                  class="w-full cursor-pointer py-4 rounded-2xl text-[#30303b] border border-black/50 font-bold dark:text-white text-xl hover:bg-[#d4d1ba] transition-colors duration-100">
                  Add to Wishlist
                </button>

              </div>
            </div>

            <div>
              <button onclick="document.getElementById('ProfilePage').classList.add('hidden')"
                class="absolute top-6 left-6 text-white p-2 bg-black/20 rounded-full hover:bg-white/10">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                  stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
              </button>
            </div>

          </div>
        </div>

        <div id="product-grid" class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 2xl:grid-cols-4 gap-5 mt-6"></div>

        <a href="/src/selling/sellingpage.html">
          <button class="btn-primary rounded-4xl bottom-19 right-10 fixed z-50 animate-bounce md:hidden">
            <span class="text-4xl">+</span>
          </button>
        </a>

        <div id="notifications"
          class="whitespace-nowrap flex w-fit p-3 left-1/2 -translate-x-1/2 z-50 top-30 md:-translate-x-1 fixed rounded-xl">
          <div id="good-notification" role="alert"
            class="hidden bg-green-100 dark:bg-green-900 border-l-4 border-green-500 dark:border-green-700 text-green-900 dark:text-green-100 p-2 rounded-lg flex items-center transition duration-300 ease-in-out hover:bg-green-200 dark:hover:bg-green-800 transform hover:scale-105">
            <div class="bg-green-400 rounded-full h-8 w-8 flex items-center justify-center mr-3 shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="4"
                stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
            <p id="pass-msg" class="text-xs font-semibold">
              Product added to wishlist
            </p>
          </div>

          <div id="fail-notification" role="alert"
            class="hidden bg-red-100 dark:bg-red-900 border-l-4 border-red-500 dark:border-red-700 text-red-900 dark:text-red-100 p-2 rounded-lg flex items-center transition duration-300 ease-in-out hover:bg-red-200 dark:hover:bg-red-800 transform hover:scale-105">
            <div class="bg-red-400 rounded-full h-8 w-8 flex items-center justify-center mr-3 shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="4"
                stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </div>
            <p id="fail-msg" class="text-xs font-semibold">
              Product removed from wishlist
            </p>
          </div>
        </div>

        <div id="noresultsfound" class="hidden">
          <img src="/assets/no-results-darkmode-BraOrZYG.png"
            class="flex ml-110 mt-20 align-center justify-center w-100 h-full" />
        </div>
      </main>
    </div>
  </div>

</body>

</html>
