<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Univo|Selling</title>
  <script type="module" crossorigin src="/assets/selling-P25a-EGA.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/supabaseClient-IcS1GkpV.js">
  <link rel="modulepreload" crossorigin href="/assets/loader-CByNdaKQ.js">
  <link rel="stylesheet" crossorigin href="/assets/marketplace-DqRCvzis.css">
</head>

<body>
    <div class="flex min-h-screen ">
        <div id="navigation-container"></div>

        <div class="flex-1 flex flex-col w-full min-w-0 flex-shrink">
            <main id="main"
                class="flex-1 ml-0 md:ml-64 p-8 min-h-screen transition-all duration-300 mt-25  bg-white flex flex-col dark:bg-[#030406] relative overflow-y-auto">
                <div id="notification-container"
                    class="whitespace-nowrap flex w-fit p-3 left-1/2 -translate-x-1/2 z-50 top-30 md:-translate-x-1 fixed rounded-xl pointer-events-none">
                </div>

                <div class="max-w-6xl mx-auto w-full pb-32">
                    <div class="mb-10 text-center md:text-left pt-6">
                        <h1
                            class="text-4xl md:text-6xl font-extrabold tracking-tight text-gray-900 dark:text-white mb-3">
                            Sell your <span
                                class="text-transparent bg-clip-text bg-gradient-to-r from-[#F0B100] to-amber-500">item</span>
                        </h1>
                        <p class="text-gray-500 dark:text-gray-400 text-xl font-medium">Provide details and images to
                            list your product on the marketplace.</p>
                    </div>

                    <div
                        class="bg-white/70 dark:bg-[#15161A]/80 backdrop-blur-2xl border border-gray-200 dark:border-gray-800 shadow-2xl rounded-[2.5rem] p-6 md:p-10">
                        <div class="flex flex-col lg:flex-row gap-10">
                            <div class="space-y-6 w-full lg:w-3/5">
                                <div>
                                    <label
                                        class="block text-sm font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-2">Title</label>
                                    <input id="title" name="pname" type="text" placeholder="e.g., Quantm Mechanocs 101"
                                        class="w-full bg-gray-50 dark:bg-[#0B0C0F] border border-gray-200 dark:border-gray-800 rounded-2xl px-5 py-4 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-[#F0B100]/50 focus:border-[#F0B100] transition-all duration-300 shadow-inner">
                                </div>

                                <div>
                                    <label
                                        class="block text-sm font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-2">Description</label>
                                    <textarea id="description" minlength="10" maxlength="200" name="pdescription"
                                        placeholder="Detailed product description..."
                                        class="w-full bg-gray-50 dark:bg-[#0B0C0F] border border-gray-200 dark:border-gray-800 rounded-2xl px-5 py-4 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-[#F0B100]/50 focus:border-[#F0B100] transition-all duration-300 shadow-inner h-36 resize-none w-full"></textarea>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label
                                            class="block text-sm font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-2">Price</label>
                                        <div class="relative">
                                            <span
                                                class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-600 font-extrabold text-lg">₹</span>
                                            <input id="price" type="number" placeholder="0.00" name="pprice"
                                                class="w-full bg-gray-50 dark:bg-[#0B0C0F] border border-gray-200 dark:border-gray-800 rounded-2xl pl-10 pr-5 py-4 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-[#F0B100]/50 focus:border-[#F0B100] transition-all duration-300 shadow-inner">
                                        </div>
                                    </div>

                                    <div>
                                        <label
                                            class="block text-sm font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-2">Quantity</label>
                                        <input id="quantity" type="number" placeholder="1" name="pquantity"
                                            class="w-full bg-gray-50 dark:bg-[#0B0C0F] border border-gray-200 dark:border-gray-800 rounded-2xl px-5 py-4 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-[#F0B100]/50 focus:border-[#F0B100] transition-all duration-300 shadow-inner">
                                    </div>
                                </div>

                                <div>
                                    <label
                                        class="block text-sm font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-2">Other
                                        Details</label>
                                    <input id="details" type="text" name="pdetails"
                                        placeholder="Condition, specifications, warranty..."
                                        class="w-full bg-gray-50 dark:bg-[#0B0C0F] border border-gray-200 dark:border-gray-800 rounded-2xl px-5 py-4 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-[#F0B100]/50 focus:border-[#F0B100] transition-all duration-300 shadow-inner">
                                </div>
                            </div>

                            <!-- Upload Area -->
                            <div class="w-full lg:w-2/5 flex flex-col h-full min-h-[300px]">
                                <label
                                    class="block text-sm font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-2">Images</label>
                                <div
                                    class="cursor-pointer flex-1 flex flex-col justify-center items-center border-[3px] border-dashed border-gray-300 dark:border-gray-700 hover:border-[#F0B100] dark:hover:border-[#F0B100] rounded-[2rem] bg-gray-50/50 dark:bg-[#0B0C0F]/50 hover:bg-[#F0B100]/5 dark:hover:bg-[#F0B100]/5 transition-all duration-300 relative group overflow-hidden">
                                    <div
                                        class="flex flex-col items-center justify-center text-center pointer-events-none p-6 z-10">
                                        <div
                                            class="w-20 h-20 mb-4 rounded-full bg-gray-100 dark:bg-gray-800 shadow-inner flex items-center justify-center group-hover:scale-110 group-hover:shadow-[0_0_20px_rgba(240,177,0,0.3)] transition-all duration-300">
                                            <svg xmlns="http://www.w3.org/2000/svg"
                                                class="w-10 h-10 text-gray-400 dark:text-gray-500 group-hover:text-[#F0B100] dark:group-hover:text-[#F0B100] transition-colors duration-300"
                                                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                                <path stroke-linecap="round" stroke-linejoin="round"
                                                    d="M12 4v16m8-8H4" />
                                            </svg>
                                        </div>
                                        <h3
                                            class="text-xl font-bold text-gray-700 dark:text-gray-300 group-hover:text-[#F0B100] transition-colors duration-300">
                                            Upload Media</h3>
                                        <p class="text-sm text-gray-500 dark:text-gray-500 mt-2 font-medium">Drag and
                                            drop or click<br>Max 4 images</p>
                                    </div>
                                    <input name="image" type="file" id="file-input" multiple
                                        class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20">
                                </div>
                                <div id="imageuploads" class="grid grid-cols-2 gap-4 mt-6 w-full"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="fixed bottom-8 right-8 flex gap-3 z-40">
                    <button id="post-btn" name="submit" type="submit"
                        class="bg-gradient-to-r from-[#F0B100] to-amber-500 hover:from-yellow-400 hover:to-amber-400 text-black font-extrabold px-10 py-5 rounded-full shadow-[0_10px_30px_rgba(240,177,0,0.4)] hover:shadow-[0_15px_40px_rgba(240,177,0,0.6)] hover:-translate-y-1 transition-all duration-300 flex items-center gap-3 text-2xl group cursor-pointer focus:outline-none focus:ring-4 focus:ring-yellow-500/30">
                        <span>List Item</span>
                        <svg xmlns="http://www.w3.org/2000/svg"
                            class="h-8 w-8 group-hover:translate-x-1 transition-transform" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                        </svg>
                    </button>
                </div>
            </main>
        </div>
    </div>


</body>

</html>
