<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/src/shared/marketplace.css" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <script>
    if (
      localStorage.getItem("color-theme") === "dark" ||
      (!localStorage.getItem("color-theme") &&
        window.matchMedia("(prefers-color-scheme: dark)").matches)
    ) {
      document.documentElement.classList.add("dark");
    }
  </script>

  <title>Univo | Marketplace</title>
</head>

<body class="overflow-x-hidden">

  <div class="flex h-screen bg-[#030406]">

    <div id="navigation-container"></div>

    <div class="flex-1 flex flex-col w-full min-w-0 flex-shrink">

      <main id="main"
        class="flex-1 ml-0 md:ml-64 p-8 min-h-screen transition-all duration-300 mt-25 bg-white flex flex-col dark:bg-[#101014] relative overflow-y-auto">

        <!-- PRODUCT POPUP -->
        <div class="fixed inset-0 z-50 flex items-center justify-center backdrop-blur-3xl hidden p-4 md:p-8"
          id="popupwindow">

          <div id="productdetails"
            class="relative flex flex-col md:flex-row w-full max-w-6xl h-[90vh] md:h-[80vh] bg-[#e3e3e3] dark:bg-[#1f1f26] rounded-3xl shadow-[0_0_20px_rgba(255,255,255,0.2)] overflow-y-auto md:overflow-hidden">

            <!-- IMAGE SIDE -->
            <div
              class="w-full md:w-1/2 h-1/2 md:h-full p-8 md:p-12 flex items-center justify-center bg-black/50 relative shrink-0">

              <button id="previousimgbtn">
                <div class="bg-black rounded-2xl p-1 cursor-pointer">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="white"
                    stroke-width="3" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                  </svg>
                </div>
              </button>

              <img id="productpageuploadimage"
                class="transition-transform duration-500 max-w-[80vw] md:max-w-full max-h-[40vh] md:max-h-[70vh] object-contain rounded-2xl m-1" />

              <button id="nextimgbtn">
                <div class="bg-black rounded-2xl p-1 cursor-pointer">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="white"
                    stroke-width="3" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                  </svg>
                </div>
              </button>

              <div id="image-indicators"
                class="absolute bottom-4 flex gap-2"></div>

            </div>

            <!-- DETAILS SIDE -->
            <div class="w-full md:w-1/2 h-max md:h-full p-6 md:p-10 flex flex-col">

              <h2 id="productname"
                class="text-3xl md:text-4xl text-[#30303b] dark:text-white font-semibold">
                Product name
              </h2>

              <p id="productprice"
                class="text-3xl md:text-4xl text-yellow-500 mt-4 font-bold">
                ₹120
              </p>


              <hr class="border-gray-800 my-6 shrink-0">

              <div
                class="flex-1 overflow-y-auto pr-2 no-scrollbar flex flex-col gap-6 min-h-0">

                <div>
                  <h3 class="text-xl md:text-2xl font-bold dark:text-white mb-3">
                    Description
                  </h3>

                  <div
                    class="w-full p-4 rounded-2xl bg-[#d6d6d6] dark:bg-[#2b3442]">
                    <p id="productdescription"
                      class="leading-relaxed text-[#30303b] dark:text-white text-sm">
                      no description provided
                    </p>
                  </div>
                </div>

                <div>
                  <h3 class="text-xl md:text-2xl font-bold dark:text-white mb-3">
                    More Details
                  </h3>

                  <div
                    class="w-full p-4 rounded-2xl bg-[#d6d6d6] dark:bg-[#2b3442]">
                    <p id="otherdetails"
                      class="text-sm md:text-base text-gray-900 dark:text-white whitespace-pre-wrap"></p>
                  </div>
                </div>

              </div>

              <!-- BUTTONS -->


              <div class="mt-4 pt-4 flex flex-col gap-3">
              <!-- NEW MARK AS SOLD BUTTON -->
                <button id="contactsellerbutton"
                  class="w-full py-4 rounded-2xl bg-[#F0B100] font-bold text-xl hover:bg-[#d9a100] transition-colors cursor-pointer">
                  Contact Seller
                </button>

                <button id="productpageaddtowishlistbtn"
                  class="w-full py-4 rounded-2xl text-[#30303b] border border-black/50 font-bold dark:text-white text-xl hover:bg-[#d4d1ba] transition-colors">
                  Add to Wishlist
                </button>
                <button id="marksoldbtn"
                  class="w-full  mt-4 py-4 rounded-2xl bg-red-600 text-white font-bold text-xl hover:bg-red-700 transition-colors cursor-pointer">
                  Mark as Sold
                </button>

              </div>

            </div>

            <!-- BACK BUTTON -->
            <div>
              <a href="/src/marketplace/market-place.html"
                class="absolute top-6 left-6 text-white p-2 bg-black/20 rounded-full hover:bg-white/10">

                <svg xmlns="http://www.w3.org/2000/svg"
                  class="h-6 w-6"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor">

                  <path stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M10 19l-7-7m0 0l7-7m-7 7h18" />

                </svg>

              </a>
            </div>

          </div>

        </div>

        <!-- PRODUCT GRID -->
        <div id="product-grid"
          class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-5 mt-6">
        </div>

      </main>

    </div>

  </div>

  <script type="module" src="/src/shared/loader.js"></script>
  <script type="module" src="/src/marketplace/marketplace.js"></script>
  <script type="module" src="/src/shared/session.js"></script>

</body>

</html>
